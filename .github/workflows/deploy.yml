name: Deploy Trip Calculator

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Clean install dependencies
        run: npm ci

      - name: Fix vite permission
        run: chmod +x node_modules/.bin/vite

      - name: Check Gemini API Secret
        env:
          GEMINI_SECRET: ${{ secrets.VITE_GEMINI_API_KEY || secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_SECRET" ]; then
            echo "Gemini API key secret missing"
            echo "Add it in GitHub repo: Settings > Secrets and variables > Actions > New repository secret"
            echo "Secret name can be VITE_GEMINI_API_KEY or GEMINI_API_KEY"
            exit 1
          fi
          echo "Gemini API secret found"

      - name: Build project
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || secrets.GEMINI_API_KEY }}

      - name: Show built files
        run: |
          echo "ROOT:"
          pwd
          echo "DIST:"
          ls -la dist
          echo "ASSETS:"
          ls -la dist/assets
          echo "INDEX:"
          cat dist/index.html



      - name: Check FTP Secrets
        run: |
          if [ -z "${{ secrets.FTP_HOST }}" ]; then
            echo "FTP_HOST missing"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "FTP_USERNAME missing"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "FTP_PASSWORD missing"
            exit 1
          fi
          echo "All FTP secrets found"
          
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: dist/
          server-dir: trip-calculator/
          dangerous-clean-slate: true
          log-level: verbose
          timeout: 60000  
